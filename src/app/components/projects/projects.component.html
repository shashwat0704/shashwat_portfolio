<section id="projects" class="py-20 md:py-32 px-6 md:px-24 bg-brand-dark">
  <div class="max-w-6xl mx-auto">
    <div class="mb-12 md:mb-20">
      <h2 class="text-4xl md:text-[56px] font-bold mb-4 md:mb-6 tracking-tighter">Case Studies</h2>
      <p class="text-[10px] md:text-[12px] font-bold text-gray-500 uppercase tracking-[0.2em]">Notable Projects</p>
    </div>

    <div class="grid sm:grid-cols-2 md:grid-cols-3 gap-6 md:gap-8">
      @for (project of projects; track project.title) {
        <div class="reveal group relative p-6 md:p-8 rounded-3xl bg-brand-nav/20 border border-white/5 hover:border-brand-green/30 transition-all duration-500 glow-border overflow-hidden">
          <!-- Background Gradient -->
          <div class="absolute inset-0 bg-gradient-to-br opacity-0 group-hover:opacity-10 transition-opacity duration-500" [ngClass]="project.color"></div>
          
          <div class="relative z-10 space-y-4 md:space-y-6">
            <div class="space-y-1 md:space-y-2">
              <p class="text-[9px] md:text-[10px] font-mono text-brand-green uppercase tracking-widest">{{ project.company }}</p>
              <h3 class="text-xl md:text-2xl font-bold tracking-tight">{{ project.title }}</h3>
            </div>
            
            <p class="text-sm md:text-[15px] text-gray-400 leading-relaxed group-hover:text-gray-300 transition-colors">
              {{ project.description }}
            </p>

            <div class="flex flex-wrap gap-2 pt-2 md:pt-4">
              @for (tag of project.tags; track tag) {
                <span class="px-2 md:px-3 py-1 bg-white/5 rounded-full text-[9px] md:text-[10px] font-mono text-gray-500 border border-white/5">
                  {{ tag }}
                </span>
              }
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
