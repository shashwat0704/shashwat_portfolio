<section id="education" class="py-24 px-8 md:px-24 bg-brand-dark">
  <div class="max-w-7xl mx-auto">
    <div class="grid md:grid-cols-2 gap-24">
      <!-- Education -->
      <div class="reveal">
        <div class="mb-12">
          <h2 class="text-4xl font-bold mb-4">Education</h2>
          <p class="text-gray-500 font-mono uppercase tracking-widest text-sm">Academic Background</p>
        </div>
        
        <div class="p-8 rounded-3xl bg-brand-card border border-white/5 glow-border">
          <div class="flex justify-between items-start mb-6">
            <div>
              <h3 class="text-2xl font-bold">{{ education.school }}</h3>
              <p class="text-brand-green">{{ education.degree }}</p>
            </div>
            <div class="text-sm font-mono text-gray-500">{{ education.period }}</div>
          </div>
          <div class="inline-block px-4 py-2 bg-white/5 rounded-full text-sm font-bold text-white">
            {{ education.grade }}
          </div>
        </div>
      </div>

      <!-- Certifications -->
      <div class="reveal">
        <div class="mb-12">
          <h2 class="text-4xl font-bold mb-4">Certifications</h2>
          <p class="text-gray-500 font-mono uppercase tracking-widest text-sm">Professional Development</p>
        </div>

        <div class="space-y-4">
          @for (cert of certifications; track cert.name) {
            <a [href]="cert.url" target="_blank" class="flex items-center gap-4 p-4 rounded-2xl bg-brand-card border border-white/5 hover:border-brand-green/20 transition-all group glow-border">
              <div class="w-2 h-2 rounded-full bg-brand-green group-hover:shadow-[0_0_8px_#6ab01d]"></div>
              <span class="text-gray-400 group-hover:text-white transition-colors flex-grow">{{ cert.name }}</span>
              <svg class="w-4 h-4 text-gray-600 group-hover:text-brand-green transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
              </svg>
            </a>
          }
        </div>
      </div>
    </div>
  </div>
</section>
