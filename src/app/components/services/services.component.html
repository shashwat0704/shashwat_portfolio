<section id="services" class="py-32 px-8 md:px-24 bg-brand-dark">
  <div class="max-w-6xl mx-auto">
    <div class="mb-20 text-center">
      <h2 class="text-[56px] font-bold mb-6 tracking-tighter">Services</h2>
      <p class="text-[12px] font-bold text-gray-500 uppercase tracking-[0.2em]">What I Do</p>
    </div>

    <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-6">
      @for (service of services; track service.title) {
        <div class="reveal group p-8 rounded-3xl bg-brand-nav/20 border border-white/5 hover:border-brand-green/30 transition-all duration-500 glow-border flex flex-col">
          <div class="w-12 h-12 rounded-2xl bg-brand-green/10 flex items-center justify-center text-brand-green mb-8 group-hover:scale-110 transition-transform">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="service.icon"></path>
            </svg>
          </div>
          <h3 class="text-xl font-bold mb-4">{{ service.title }}</h3>
          <p class="text-[14px] text-gray-500 leading-relaxed group-hover:text-gray-400 transition-colors">
            {{ service.description }}
          </p>
        </div>
      }
    </div>
  </div>
</section>
