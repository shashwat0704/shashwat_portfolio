<section id="services" class="py-20 md:py-32 px-6 md:px-24 bg-brand-dark">
  <div class="max-w-6xl mx-auto">
    <div class="mb-12 md:mb-20 text-center md:text-left">
      <h2 class="text-4xl md:text-[56px] font-bold mb-4 md:mb-6 tracking-tighter">Services</h2>
      <p class="text-[10px] md:text-[12px] font-bold text-gray-500 uppercase tracking-[0.2em]">What I Do</p>
    </div>

    <div class="grid sm:grid-cols-2 lg:grid-cols-4 gap-6">
      @for (service of services; track service.title) {
        <div class="reveal group p-6 md:p-8 rounded-3xl bg-brand-nav/20 border border-white/5 hover:border-brand-green/30 transition-all duration-500 glow-border flex flex-col">
          <div class="w-10 h-10 md:w-12 md:h-12 rounded-2xl bg-brand-green/10 flex items-center justify-center text-brand-green mb-6 md:mb-8 group-hover:scale-110 transition-transform">
            <svg class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="service.icon"></path>
            </svg>
          </div>
          <h3 class="text-lg md:text-xl font-bold mb-3 md:mb-4">{{ service.title }}</h3>
          <p class="text-xs md:text-[14px] text-gray-500 leading-relaxed group-hover:text-gray-400 transition-colors">
            {{ service.description }}
          </p>
        </div>
      }
    </div>
  </div>
</section>
