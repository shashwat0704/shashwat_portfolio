<section id="experience" class="py-20 md:py-32 px-6 md:px-24 bg-brand-dark">
  <div class="max-w-6xl mx-auto">
    <div class="mb-12 md:mb-16">
      <h2 class="text-4xl md:text-[56px] font-bold mb-4 md:mb-6 tracking-tighter">Experience</h2>
      <p class="text-[10px] md:text-[12px] font-bold text-gray-500 uppercase tracking-[0.2em]">Greatest Hits</p>
    </div>

    <div class="space-y-6 md:space-y-8">
      @for (exp of experiences; track exp.company) {
        <div class="reveal group relative overflow-hidden rounded-3xl bg-brand-nav/20 border border-white/5 transition-all duration-500 hover:border-brand-green/30 flex flex-col md:flex-row min-h-auto md:min-h-[350px] glow-border">
          <!-- Visual Side (40%) -->
          <div class="md:w-2/5 bg-gradient-to-br flex flex-col items-center justify-center p-8 md:p-12 text-center" [ngClass]="exp.color">
             <div class="text-3xl md:text-4xl font-black tracking-tighter text-white drop-shadow-2xl mb-4">
               {{ exp.company }}
             </div>
             <div class="w-12 md:w-16 h-[2px] bg-white/20"></div>
          </div>

          <!-- Info Side (60%) -->
          <div class="md:w-3/5 p-8 md:p-12 flex flex-col justify-center">
            <div class="flex flex-col mb-4 md:mb-6">
              <h3 class="text-xl md:text-2xl font-bold mb-1">{{ exp.company }}</h3>
              <div class="flex flex-wrap items-center gap-2 md:gap-3 text-[12px] md:text-[13px] font-medium text-gray-500">
                <span class="text-white opacity-80">{{ exp.role }}</span>
                <span class="opacity-30 hidden md:inline">•</span>
                <span>{{ exp.period }}</span>
              </div>
            </div>

            <div class="flex flex-wrap gap-2 mb-6 md:mb-8">
              @for (tag of exp.tags; track tag) {
                <span class="text-[9px] md:text-[10px] font-bold uppercase tracking-wider text-gray-400 bg-white/5 px-2 md:px-3 py-1 md:py-1.5 rounded-full border border-white/5">
                  {{ tag }}
                </span>
              }
            </div>

            <p class="text-sm md:text-[15px] text-gray-400 leading-relaxed md:leading-[1.6]">
              {{ exp.description }}
            </p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
