<section id="tech-skills" class="py-20 md:py-32 px-6 md:px-24 bg-brand-dark">
  <div class="max-w-6xl mx-auto">
    <div class="mb-12 md:mb-20">
      <h2 class="text-4xl md:text-[56px] font-bold mb-4 md:mb-6 tracking-tighter">Stack</h2>
      <p class="text-[10px] md:text-[12px] font-bold text-gray-500 uppercase tracking-[0.2em]">Technologies & Methodology</p>
    </div>

    <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-8 md:gap-12">
      @for (group of skillGroups; track group.category) {
        <div class="reveal space-y-6">
          <h3 class="text-xs md:text-sm font-mono text-brand-green uppercase tracking-widest">{{ group.category }}</h3>
          <div class="space-y-4">
            @for (skill of group.skills; track skill.name) {
              <div class="p-5 rounded-2xl bg-brand-nav/40 border border-white/5 hover:border-brand-green/30 transition-all duration-300 group glow-border">
                <p class="text-white font-bold text-sm mb-1 group-hover:text-brand-green transition-colors">{{ skill.name }}</p>
                <p class="text-xs text-gray-500 leading-relaxed">{{ skill.proof }}</p>
              </div>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
